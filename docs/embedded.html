<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded BASIL Replay Stream</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #11141a;
      color: #f4f6fa;
      font-family: sans-serif;
    }
    body {
      padding: 2.5%;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 1rem 0;
      font-size: clamp(1.35rem, 2vw, 2rem);
      font-weight: 700;
    }
    .frame-shell {
      height: calc(100vh - 2.5rem - 5vw);
    }
    .demo-frame {
      width: 100%;
      height: 100%;
      border: 1px solid #2b3442;
      border-radius: 6px;
      display: block;
      background: #0f141a;
    }
  </style>
</head>
<body>
  <h1>Embedded BASIL Replay Stream</h1>
  <div class="frame-shell">
    <iframe
      class="demo-frame"
      title="Embedded Replay Viewer"
      src="./?embedded=1&player=Purple&maxMinutes=25"></iframe>
  </div>
</body>
</html>
